<div class="modal-backdrop" (click)="onCancel()">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Mark as calibration</h5>
        <button type="button" class="btn-close" aria-label="Close" (click)="onCancel()"></button>
      </div>

      <div class="modal-body">
        <p class="text-muted mb-3">
          You are marking {{ selectedCount }} measurement(s) as CALIBRATION.
        </p>

        <div class="mb-3">
          <label class="form-label">Target concentration</label>
          <input
            class="form-control"
            type="number"
            [(ngModel)]="form.referenceConcentration"
            placeholder="e.g. 100"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Unit</label>
          <input
            class="form-control"
            type="text"
            [(ngModel)]="form.referenceConcentrationUnit"
            placeholder="e.g. ng/mL"
          />
        </div>

        <div class="mb-3 form-check">
          <input
            type="checkbox"
            class="form-check-input"
            id="includedInCalibration"
            [(ngModel)]="form.includedInCalibration"
          />
          <label class="form-check-label" for="includedInCalibration">
            Include in calibration
          </label>
        </div>

        <div class="mb-3">
          <label class="form-label">Replicate label (optional)</label>
          <input
            class="form-control"
            type="text"
            [(ngModel)]="form.replicateLabel"
            placeholder="e.g. A1, B2"
          />
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="onSubmit()">Apply</button>
      </div>
    </div>
  </div>
</div>
